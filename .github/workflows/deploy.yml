name: 7th-room-project-rds-deploy

on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    
    outputs:
      # вҳ… [н•„мҲҳ] Job л ҲлІЁм—җм„ң н•ҳлӢЁ Stepмқҳ кІ°кіјк°’мқ„ мҷёл¶ҖлЎң л…ём¶ңн•©лӢҲлӢӨ.
      RDS_ENDPOINT: ${{ steps.get-rds.outputs.RDS_ENDPOINT }}
      EC2_PUBLIC_IP: ${{ steps.get-ec2-ip.outputs.EC2_PUBLIC_IP }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.4
          terraform_wrapper: false

      - name: Terraform Init & Apply
        id: apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Get RDS Endpoint
        id: get-rds
        run: |
          ENDPOINT=$(terraform output -raw rds_endpoint)
          echo "RDS_ENDPOINT=$ENDPOINT" >> $GITHUB_OUTPUT

      - name: Fetch EC2 IP by Tag
        id: get-ec2-ip
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2
        run: |
          INSTANCE_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=AWS_ec2_sg_7th_room" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          echo "EC2_PUBLIC_IP=$INSTANCE_IP" >> $GITHUB_OUTPUT

  deploy:
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # SSH нӮӨ м„Өм •
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 400 ~/.ssh/id_rsa

      # Inventory нҢҢмқј мғқм„ұ (Ansibleмҡ©)
      - name: Create Ansible inventory file
        run: |
          cd ansible
          echo "[k3s_cluster]" > inventory.ini
          echo "${{ needs.terraform.outputs.ec2_public_ip }} ansible_user=ec2-user ansible_ssh_private_key_file=/home/runner/.ssh/id_rsa" >> inventory.ini

      # RDS endpoint м№ҳнҷҳ
      - name: Replace RDS endpoint in infra.yml
        run: |
          sed -i "s|__RDS_ENDPOINT__|${{ needs.terraform.outputs.RDS_ENDPOINT }}|g" ansible/roles/k3s/infra.yml

      # K3s Secret мғқм„ұ (DB_PASSWORD)
      - name: Create Kubernetes DB Secret
        run: |
          ssh -i ~/.ssh/id_rsa ec2-user@${{ needs.terraform.outputs.ec2_public_ip }} << EOF
            sudo k3s kubectl create secret generic db-secret \
              --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              --dry-run=client -o yaml | sudo k3s kubectl apply -f -
          EOF

      # EC2м—җм„ң K3s м•ұ мһ¬л°°нҸ¬ (м—…лҚ°мқҙнҠё)
      - name: Run Ansible infra.yml
        run: |
          cd ansible
          ansible-playbook -i inventory.ini roles/k3s/infra.yml

      # м•ұ к°•м ң мһ¬мӢңмһ‘
      - name: Restart myapi Deployment
        run: |
          ssh -i ~/.ssh/id_rsa ec2-user@${{ needs.terraform.outputs.ec2_public_ip }} << EOF
            sudo k3s kubectl rollout restart deployment myapi
          EOF
