name: "7th-room-project-rds-recovery"

on:
  workflow_dispatch: # 수동 실행 버튼

jobs:
  recovery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 테라폼 환경 설정 및 실행
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.4
          terraform_wrapper: false

      - name: Terraform Restore RDS
        id: tf
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          terraform init
          terraform apply -auto-approve
          
          # 생성된 아웃풋 값들을 환경변수에 저장
          echo "NEW_RDS_ADDR=$(terraform output -raw rds_endpoint)" >> $GITHUB_ENV
          echo "TARGET_EC2_IP=$(terraform output -raw ec2_public_ip)" >> $GITHUB_ENV

      # SSH 키 설정
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /home/runner/.ssh/id_rsa
          chmod 600 /home/runner/.ssh/id_rsa
          ssh-keyscan -H ${{ env.TARGET_EC2_IP }} >> /home/runner/.ssh/known_hosts || true

      # K3s 서비스 주소 자동 패치 (ExternalName 업데이트)
      - name: Patch K3s DB Endpoint
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.TARGET_EC2_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 이 한 줄이 백미입니다: 앱 수정 없이 DB 주소만 갈아끼우기
            sudo /usr/local/bin/k3s kubectl patch svc db -p '{"spec":{"externalName":"${{ env.NEW_RDS_ADDR }}"}}'
            
            # 연결 세션 초기화를 위한 앱 재시작 (선택 사항)
            sudo /usr/local/bin/k3s kubectl rollout restart deployment myapi
