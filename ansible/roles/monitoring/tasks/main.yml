---
# 네임스페이스 및 레포지토리 준비
- name: "모니터링 네임스페이스 생성"
  ansible.builtin.shell: /usr/local/bin/kubectl create namespace monitoring || true
  environment: { KUBECONFIG: /etc/rancher/k3s/k3s.yaml }

- name: "Helm 레포지토리 추가 및 업데이트"
  ansible.builtin.shell: |
    /usr/local/bin/helm repo add vm https://victoriametrics.github.io/helm-charts
    /usr/local/bin/helm repo add grafana https://grafana.github.io/helm-charts
    /usr/local/bin/helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
    /usr/local/bin/helm repo update
  environment: { KUBECONFIG: /etc/rancher/k3s/k3s.yaml }

# EC2 공인 IP 정보 수집
- name: "EC2 공인 IP 정보 수집"
  block:
    - name: "IMDSv2 토큰 가져오기"
      ansible.builtin.uri:
        url: http://169.254.169.254/latest/api/token
        method: PUT
        headers: { "X-aws-ec2-metadata-token-ttl-seconds": "21600" }
        return_content: true
      register: ec2_imds_token_response

    - name: "공인 IP 가져오기"
      ansible.builtin.uri:
        url: http://169.254.169.254/latest/meta-data/public-ipv4
        method: GET
        headers: { "X-aws-ec2-metadata-token": "{{ ec2_imds_token_response.content }}" }
        return_content: true
      register: ec2_public_ipv4_response

    - name: "공인 IP 변수 저장"
      ansible.builtin.set_fact:
        ec2_public_ip: "{{ ec2_public_ipv4_response.content }}"

# Node Exporter 설치 (Annotation 에러 해결을 위해 --set-string 사용)
- name: "Prometheus Node Exporter 설치"
  ansible.builtin.shell: |
    /usr/local/bin/helm upgrade --install node-exporter prometheus-community/prometheus-node-exporter \
      --namespace monitoring \
      --set rbac.create=true \
      --set resources.limits.memory=30Mi \
      --set resources.requests.memory=15Mi \
      --set-string service.annotations."prometheus\.io/scrape"="true" \
      --set-string service.annotations."prometheus\.io/port"="9100"
  environment: { KUBECONFIG: /etc/rancher/k3s/k3s.yaml }

# 3. VictoriaMetrics Single 설치
- name: "VictoriaMetrics Single 설치"
  ansible.builtin.shell: |
    /usr/local/bin/helm upgrade --install vmsingle vm/victoria-metrics-single \
      --namespace monitoring \
      --set server.resources.limits.memory=350Mi \
      --set server.retentionPeriod=1 \
      --set server.persistentVolume.enabled=false
  environment: { KUBECONFIG: /etc/rancher/k3s/k3s.yaml }

# VMAgent 설치
- name: "VMAgent 설치"
  ansible.builtin.shell: |
    /usr/local/bin/helm upgrade --install vmagent vm/victoria-metrics-agent \
      --namespace monitoring \
      --set "remoteWrite[0].url=http://vmsingle-victoria-metrics-single-server:8428/api/v1/write" \
      --set config.global.scrape_interval=60s \
      --set resources.limits.memory=120Mi
  environment: { KUBECONFIG: /etc/rancher/k3s/k3s.yaml }

# Grafana 설치 (익명 로그인 + 데이터 소스 UID 강제 지정)
- name: "Grafana 설치 (익명 뷰어 모드)"
  ansible.builtin.shell: |
    /usr/local/bin/helm upgrade --install grafana grafana/grafana \
      --namespace monitoring \
      --set adminPassword=admin123 \
      --set "grafana\.ini.server.root_url=http://{{ ec2_public_ip }}/grafana/" \
      --set "grafana\.ini.server.serve_from_sub_path=true" \
      --set "grafana\.ini.auth\.anonymous.enabled=true" \
      --set "grafana\.ini.auth\.anonymous.org_name=Main Org." \
      --set "grafana\.ini.auth\.anonymous.org_role=Admin" \
      --set "datasources.datasources\.yaml.apiVersion=1" \
      --set "datasources.datasources\.yaml.datasources[0].name=VictoriaMetrics" \
      --set "datasources.datasources\.yaml.datasources[0].type=prometheus" \
      --set "datasources.datasources\.yaml.datasources[0].url=http://vmsingle-victoria-metrics-single-server:8428" \
      --set "datasources.datasources\.yaml.datasources[0].uid=VictoriaMetrics" \
      --set "datasources.datasources\.yaml.datasources[0].isDefault=true" \
      --set "datasources.datasources\.yaml.datasources[1].name=Loki" \
      --set "datasources.datasources\.yaml.datasources[1].type=loki" \
      --set "datasources.datasources\.yaml.datasources[1].url=http://loki:3100" \
      --set "datasources.datasources\.yaml.datasources[1].uid=Loki" \
      --set sidecar.dashboards.enabled=true \
      --set sidecar.dashboards.label=grafana_dashboard \
      --set resources.limits.memory=200Mi \
      --set persistence.enabled=false
  environment: { KUBECONFIG: /etc/rancher/k3s/k3s.yaml }
- name: "Loki 설치 (v7 emptyDir 정상 동작 버전)"
  ansible.builtin.shell: |
    /usr/local/bin/helm upgrade --install loki grafana/loki \
      --namespace monitoring \
      --set deploymentMode=SingleBinary \
      --set loki.auth_enabled=false \
      --set loki.useTestSchema=true \
      --set singleBinary.replicas=1 \
      --set read.replicas=0 \
      --set write.replicas=0 \
      --set backend.replicas=0 \
      --set gateway.enabled=false \
      --set resultsCache.enabled=false \
      --set chunksCache.enabled=false \
      --set sidecar.rules.enabled=false \
      --set sidecar.alerts.enabled=false \
      --set lokiCanary.enabled=false \
      --set test.enabled=false \
      --set singleBinary.persistence.enabled=false \
      --set loki.persistence.enabled=false \
      --set loki.storage.type=filesystem \
      --set loki.resources.limits.memory=350Mi \
      --set "loki.commonConfig.replication_factor=1" \
      --set "loki.storage.bucketNames.chunks=chunks" \
      --set "loki.storage.bucketNames.ruler=ruler" \
      --set "loki.storage.bucketNames.admin=admin" \
      --set "singleBinary.extraVolumes[0].name=storage" \
      --set "singleBinary.extraVolumes[0].emptyDir.medium=" \
      --set "singleBinary.extraVolumeMounts[0].name=storage" \
      --set "singleBinary.extraVolumeMounts[0].mountPath=/var/loki"
  environment: { KUBECONFIG: /etc/rancher/k3s/k3s.yaml }

- name: "Promtail values 파일 생성"
  ansible.builtin.template:
    src: promtail-values.yaml.j2
    dest: /tmp/promtail-values.yaml
    mode: '0644'

- name: "Promtail 설치 (WAF 대시보드 호환 설정)"
  ansible.builtin.shell: |
    /usr/local/bin/helm upgrade --install promtail grafana/promtail \
      --namespace monitoring \
      -f /tmp/promtail-values.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    
# 대시보드 배포 (에러 해결을 위한 모든 변수 매핑)
- name: "대시보드 파일 배포 프로세스"
  block:
    - name: "JSON 템플릿 전송"
      ansible.builtin.template:
        src: "{{ role_path }}/templates/{{ item.name }}.json.j2"
        dest: "/tmp/{{ item.name }}.json"
        mode: '0644'
        variable_start_string: '<<['
        variable_end_string: ']>>'
      loop: &dashboard_items
        - { id: 'k3s', name: 'k3s-dashboard' }
        - { id: 'waf', name: '7th-room-waf-dashboard' }
        - { id: 'node', name: 'view_node' }
      vars: # 스크린샷의 모든 에러를 잡기 위해 다양한 변수명 대응
        ds_prometheus: "VictoriaMetrics"
        DS_PROMETHEUS: "VictoriaMetrics"
        DS_VICTORIAMETRICS: "VictoriaMetrics"
        DS_RANCHER_MONITORING: "VictoriaMetrics"
        ds_loki: "Loki"
        DS_LOKI: "Loki"

    - name: "ConfigMap 등록"
      ansible.builtin.shell: |
        /usr/local/bin/kubectl create configmap dashboard-{{ item.id }} \
          --from-file={{ item.name }}.json=/tmp/{{ item.name }}.json \
          -n monitoring --dry-run=client -o yaml | \
        /usr/local/bin/kubectl label -f - grafana_dashboard="1" --local -o yaml | \
        /usr/local/bin/kubectl apply --server-side --force-conflicts -f -
      loop: *dashboard_items
      environment: { KUBECONFIG: /etc/rancher/k3s/k3s.yaml }

# Ingress 및 TLS 설정
- name: "Grafana용 Ingress 생성"
  ansible.builtin.shell: |
    cat <<EOF | /usr/local/bin/kubectl apply -f -
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: grafana-ingress
      namespace: monitoring
      annotations:
        nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    spec:
      ingressClassName: nginx
      tls:
      - secretName: waf-tls-secret
      rules:
      - http:
          paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 80
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

# 임시 파일 삭제
- name: "임시 파일 삭제"
  ansible.builtin.file:
    path: "/tmp/{{ item.name }}.json"
    state: absent
  loop: *dashboard_items
