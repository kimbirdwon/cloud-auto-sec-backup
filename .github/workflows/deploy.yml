name: 7th-room-project-rds-deploy

on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.4
          terraform_wrapper: false

      - name: Terraform Init & Apply
        id: apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Get RDS Endpoint
        id: get-rds
        run: |
          ENDPOINT=$(terraform output -raw rds_endpoint)
          echo "RDS_ENDPOINT=$ENDPOINT" >> $GITHUB_OUTPUT

  deploy:
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # SSH 키 설정
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 400 ~/.ssh/id_rsa

      # Inventory 파일 생성 (Ansible용)
      - name: Create Ansible inventory file
        run: |
          cd ansible
          echo "[k3s_cluster]" > inventory.ini
          echo "${{ secrets.EC2_PUBLIC_IP }} ansible_user=ec2-user ansible_ssh_private_key_file=/home/runner/.ssh/id_rsa" >> inventory.ini

      # RDS endpoint 치환
      - name: Replace RDS endpoint in infra.yml
        run: |
          sed -i "s|__RDS_ENDPOINT__|${{ needs.terraform.outputs.RDS_ENDPOINT }}|g" ansible/roles/k3s/infra.yml

      # EC2에서 K3s 앱 재배포 (업데이트)
      - name: Run Ansible infra.yml
        run: |
          cd ansible
          ansible-playbook -i inventory.ini roles/k3s/infra.yml

      # K3s Secret 생성 (DB_PASSWORD)
      - name: Create Kubernetes DB Secret
        run: |
          ssh -i ~/.ssh/id_rsa ec2-user@${{ secrets.EC2_PUBLIC_IP }} << EOF
            sudo k3s kubectl create secret generic db-secret \
              --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              --dry-run=client -o yaml | sudo k3s kubectl apply -f -
          EOF
