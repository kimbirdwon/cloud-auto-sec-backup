name: 7th-room-project-deploy

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN}}

      - name: Build and Push Flask App
        uses: docker/build-push-action@v5
        with:
          context: ./myapp/api
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/myapi:latest

  terraform:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    outputs:
      EC2_PUBLIC_IP: ${{ steps.get-ip.outputs.EC2_PUBLIC_IP }}
      RDS_ENDPOINT: ${{ steps.get-rds.outputs.RDS_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4
      - name: Terraform Setup
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.4
          terraform_wrapper: false

      - name: Terraform Init & Apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve
          
      - name: Get EC2 Public IP
        id: get-ip
        run: |
          cd terraform
          # IP를 가져와서 제대로 출력되는지 로그로 확인
          TEMP_IP=$(terraform output -raw room7_public_ip)
          echo "Current IP: $TEMP_IP"
          # $GITHUB_OUTPUT에 저장
          echo "EC2_PUBLIC_IP=$TEMP_IP" >> $GITHUB_OUTPUT


      # RDS endpoint 가져옴
      - name: Get RDS Endpoint
        id: get-rds
        working-directory: terraform
        run: |
          TEMP_RDS=$(terraform output -raw endpoint)
          echo "RDS_ENDPOINT=$TEMP_RDS" >> $GITHUB_OUTPUT
          
  deploy:
    needs: [terraform, build-and-push]
    runs-on: ubuntu-latest
    if: needs.terraform.outputs.EC2_PUBLIC_IP != ''
    steps:
      - uses: actions/checkout@v4
        
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /home/runner/.ssh/id_rsa
          chmod 400 /home/runner/.ssh/id_rsa
          ssh-keyscan -H ${{ needs.terraform.outputs.EC2_PUBLIC_IP }} >> /home/runner/.ssh/known_hosts

      - name: Create Ansible inventory file
        run: |
         cd ansible
         echo "[k3s_cluster]" > inventory.ini
         echo "${{ needs.terraform.outputs.EC2_PUBLIC_IP }} ansible_user=ec2-user ansible_ssh_private_key_file=/home/runner/.ssh/id_rsa" >> inventory.ini

      # [단계 1] Ansible 실행 (클라이언트 도구 및 k3s 설치)
      - name: Run Ansible (Install Tools & K3s)
        run: |
          cd ansible
          ansible-playbook -i inventory.ini site.yml -e "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" -e "rds_endpoint=${{ needs.terraform.outputs.RDS_ENDPOINT }}"

      # [단계 2] DB 초기화 (앤서블이 설치한 mysql 명령어를 사용)
      - name: Initialize RDS Database
        run: |
          TARGET_IP=${{ needs.terraform.outputs.EC2_PUBLIC_IP }}
          RDS_ENDPOINT=${{ needs.terraform.outputs.RDS_ENDPOINT }}
          
          # init.sql 전송
          scp -i /home/runner/.ssh/id_rsa ./myapp/api/init.sql ec2-user@$TARGET_IP:/home/ec2-user/init.sql
          
          # 앤서블이 설치한 mariadb105(mysql) 도구로 SQL 실행
          ssh -i /home/runner/.ssh/id_rsa ec2-user@$TARGET_IP \
            "mysql -h $RDS_ENDPOINT -u admin -p'${{ secrets.DB_PASSWORD }}' < /home/ec2-user/init.sql"

      # [단계 3] 앱 새로고침 (DB 연결 보장)
      - name: Refresh API Deployment
        run: |
          TARGET_IP=${{ needs.terraform.outputs.EC2_PUBLIC_IP }}
          ssh -i /home/runner/.ssh/id_rsa ec2-user@$TARGET_IP \
            "sudo /usr/local/bin/k3s kubectl rollout restart deployment myapi"

      # GitHub Secret(DB_PASSWORD)을 K3s Secret으로 생성
