- name: "K3s 설치 실행"
  become: true
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_SKIP_SELINUX_RPM=true INSTALL_K3S_EXEC="--disable traefik" sh -
  args:
    creates: /usr/local/bin/k3s
  register: k3s_out

- name: "k3s.yaml 설정 파일 생성 대기"
  become: true
  ansible.builtin.wait_for:
    path: /etc/rancher/k3s/k3s.yaml
    state: present
    delay: 5
    timeout: 300

- name: K3s 서비스 활성화 및 시작 (설치 시 시작되지 않은 경우)
  become: true
  ansible.builtin.raw: |
    sudo systemctl enable --now k3s
  changed_when: false

- name: "kubectl 심볼릭 링크 생성"
  become: true
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link
    force: true

- name: "kubeconfig 디렉토리 생성"
  become: true
  ansible.builtin.file:
    path: /home/ec2-user/.kube
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0755'

- name: "kubeconfig 파일 복사"
  become: true
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /home/ec2-user/.kube/config
    owner: ec2-user
    group: ec2-user
    mode: '0600'
    remote_src: true

- name: "ec2-user의 .bashrc에 KUBECONFIG 경로 추가"
  ansible.builtin.lineinfile:
    path: /home/ec2-user/.bashrc
    line: 'export KUBECONFIG=$HOME/.kube/config'
    create: true
    state: present
  become: true
  become_user: ec2-user
  changed_when: false

- name: "DB 비밀번호용 K3s Secret 생성"
  become: true
  become_user: ec2-user
  ansible.builtin.shell: |
    /usr/local/bin/kubectl create secret generic db-secret \
      --from-literal=DB_PASSWORD="$DB_PASSWORD" \
      --dry-run=client -o yaml | /usr/local/bin/kubectl apply -f -
  environment:
    KUBECONFIG: /home/ec2-user/.kube/config
    DB_PASSWORD: "{{ DB_PASSWORD }}"

- name: "infra.yml 파일을 서버로 복사"
  ansible.builtin.template:
    src: infra.yml.j2
    dest: /home/ec2-user/infra.yml
    owner: ec2-user
    group: ec2-user
    mode: '0644'

- name: "k3s 리소스 배포 (kubectl apply -f infra.yml)"
  become: true
  become_user: ec2-user
  ansible.builtin.shell: |
    /usr/local/bin/kubectl apply -f /home/ec2-user/infra.yml
  environment:
    KUBECONFIG: /home/ec2-user/.kube/config
  register: deploy_out
