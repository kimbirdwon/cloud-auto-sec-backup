name: 7th-room-project-rds-deploy

on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    outputs:
      # ★ [필수] Job 레벨에서 하단 Step의 결과값을 외부로 노출합니다.
      RDS_ENDPOINT: ${{ steps.get-rds.outputs.RDS_ENDPOINT }}
      EC2_PUBLIC_IP: ${{ steps.get-ec2-ip.outputs.EC2_PUBLIC_IP }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.4
          terraform_wrapper: false

      - name: Terraform Init & Apply
        id: apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Get RDS Endpoint
        id: get-rds
        run: |
          ENDPOINT=$(terraform output -raw new_rds_endpoint)
          echo "RDS_ENDPOINT=$ENDPOINT" >> $GITHUB_OUTPUT

      # ★ [추가] S3 백엔드가 없으므로 태그로 현재 EC2 IP를 직접 찾아냅니다.
      - name: Fetch EC2 IP by Tag
        id: get-ec2-ip
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2
        run: |
          INSTANCE_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=ec2-7th-room" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          echo "EC2_PUBLIC_IP=$INSTANCE_IP" >> $GITHUB_OUTPUT

  deploy:
    needs: terraform
    runs-on: ubuntu-latest
    # IP가 확인되었을 때만 실행
    if: needs.terraform.outputs.EC2_PUBLIC_IP != ''
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /home/runner/.ssh/id_rsa
          chmod 600 /home/runner/.ssh/id_rsa
          # IP 주소를 명확히 확인하여 지문 등록
          ssh-keyscan -H ${{ needs.terraform.outputs.EC2_PUBLIC_IP }} >> /home/runner/.ssh/known_hosts

      - name: Create Ansible inventory file
        run: |
          cd ansible
          echo "[k3s_cluster]" > inventory.ini
          # ★ secrets가 아닌 terraform outputs에서 IP를 가져옵니다.
          echo "${{ needs.terraform.outputs.EC2_PUBLIC_IP }} ansible_user=ec2-user ansible_ssh_private_key_file=/home/runner/.ssh/id_rsa" >> inventory.ini

      - name: Create Kubernetes DB Secret
        run: |
          # ★ secrets가 아닌 terraform outputs에서 IP를 가져옵니다.
          ssh -i /home/runner/.ssh/id_rsa ec2-user@${{ needs.terraform.outputs.EC2_PUBLIC_IP }} << EOF
            sudo k3s kubectl create secret generic db-secret \
              --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              --dry-run=client -o yaml | sudo k3s kubectl apply -f -
          EOF

      - name: Run Ansible infra.yml
        run: |
          cd ansible
          # RDS 주소를 변수로 전달하여 infra.yml 업데이트
          ansible-playbook -i inventory.ini site.yml \
            -e "rds_endpoint=${{ needs.terraform.outputs.RDS_ENDPOINT }}"

      - name: Restart myapi Deployment
        run: |
          ssh -i /home/runner/.ssh/id_rsa ec2-user@${{ needs.terraform.outputs.EC2_PUBLIC_IP }} "sudo k3s kubectl rollout restart deployment myapi"
