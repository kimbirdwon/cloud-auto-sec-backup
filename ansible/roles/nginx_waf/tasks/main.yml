---
- name: "Nginx Ingress WAF 컨트롤러 설치 (통합 및 기본 클래스 설정)"
  kubernetes.core.helm:
    name: nginx-waf
    chart_ref: ingress-nginx
    chart_repo_url: https://kubernetes.github.io/ingress-nginx
    release_namespace: ingress-nginx
    create_namespace: true
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    values:
      controller:
        kind: DaemonSet
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        admissionWebhooks: { enabled: false }
        service: { type: ClusterIP }
        # --- [Metrics 설정 수정] ---
        metrics:
          enabled: true
          serviceMonitor:
            # VictoriaMetrics Single은 ServiceMonitor CRD를 지원하지 않으므로 false로 설정
            enabled: false
        podAnnotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "10254"
        # ----------------------------
        # ★ [핵심 수정] 이 컨트롤러를 기본 인그레스 관리자로 지정
        ingressClassResource:
          name: nginx
          enabled: true
          default: true
          controllerValue: "k8s.io/ingress-nginx"
        # 클래스 지정이 없는 인그레스도 감시하도록 설정
        watchIngressWithoutClass: true
        config:
          enable-modsecurity: "true"
          enable-owasp-modsecurity-crs: "true"
          # --- [과도한 접근 차단 설정 추가] ---
          limit-req-status-code: "403"
          use-forwarded-headers: "true"
          # ---------------------------------
          # ★ 여기에 적으면 모든 인그레스에 자동 적용됩니다!
          log-format-upstream: >-
            {"time": "$time_iso8601", "remote_addr": "$remote_addr", "host": "$host", 
            "request": "$request", "status": "$status", "body_bytes_sent": "$body_bytes_sent", 
            "request_time": "$request_time", "req_id": "$req_id"}
          modsecurity-snippet: |
            SecRuleEngine On
            SecRuleRemoveById 920350
            SecRuleRemoveById 911100
            SecRequestBodyAccess On
            SecAuditEngine RelevantOnly
            SecAuditLog /dev/stdout
    state: present

- name: "HTTPS용 자체 서명 인증서 생성 및 Secret 등록"
  ansible.builtin.shell: |
    if [ ! -f /tmp/tls.key ]; then
      openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /tmp/tls.key -out /tmp/tls.crt -subj "/CN=7th-room-waf"
    fi
    /usr/local/bin/kubectl create secret tls waf-tls-secret --cert=/tmp/tls.crt --key=/tmp/tls.key -n default --dry-run=client -o yaml | /usr/local/bin/kubectl apply -f -
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml