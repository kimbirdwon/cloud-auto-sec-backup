name: 7th-room-project-deploy

on:
  workflow_dispatch: # 수동 실행 버튼

jobs:
  # 도커 빌드 및 푸시
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN}}

      - name: Build and Push Flask App
        uses: docker/build-push-action@v5
        with:
          # Dockerfile이 있는 경로 지정
          context: ./myapp/api
          push: true
          # 이미지 이름 
          tags: ${{ secrets.DOCKER_USERNAME }}/myapi:latest

  terraform:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    
    outputs:
      EC2_PUBLIC_IP: ${{ steps.get-ip.outputs.EC2_PUBLIC_IP }}
      RDS_ENDPOINT: ${{ steps.get-rds.outputs.RDS_ENDPOINT }}

    steps:
      - uses: actions/checkout@v4
   
      - name: Terraform Running Start
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.4
          terraform_wrapper: false
          # 명확한 주소 확인을 위해 다른 출력은 생략

      - name: Terraform Init & plan & apply
        id: apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

        # apply 시 plan 자동 수행되므로 별도 plan 불필요
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve
          
      - name: Get EC2 Public IP
        id: get-ip
        run: |
          cd terraform
          # IP를 가져와서 제대로 출력되는지 로그로 확인
          TEMP_IP=$(terraform output -raw room7_public_ip)
          echo "Current IP: $TEMP_IP"
          # $GITHUB_OUTPUT에 저장
          echo "EC2_PUBLIC_IP=$TEMP_IP" >> $GITHUB_OUTPUT

      # RDS endpoint 가져옴
      - name: Get RDS Endpoint
        id: get-rds
        working-directory: terraform
        run: |
          TEMP_RDS=$(terraform output -raw endpoint)
          echo "RDS_ENDPOINT=$TEMP_RDS" >> $GITHUB_OUTPUT
          
  deploy:
    needs: [terraform, build-and-push]
    runs-on: ubuntu-latest

    # 조건부 실행: EC2_PUBLIC_IP가 비어있지 않은 경우에만 실행
    if: needs.terraform.outputs.EC2_PUBLIC_IP != ''
    steps:
      - uses: actions/checkout@v4
        
      # SSH 키 설정 (절대 경로 및 멀티라인 처리)
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /home/runner/.ssh/id_rsa
          chmod 400 /home/runner/.ssh/id_rsa
          
          # 서버 부팅 대기 (SSH 포트 열릴 때까지 기다림)
          echo "Waiting for SSH to be available on ${{ needs.terraform.outputs.EC2_PUBLIC_IP }}..."
          for i in $(seq 1 30); do
            nc -z -w 5 ${{ needs.terraform.outputs.EC2_PUBLIC_IP }} 22 && break
            echo "Attempt $i: SSH not yet available, waiting 10 seconds..."
            sleep 10
          done
          echo "SSH is available."
          
          TARGET_IP=${{ needs.terraform.outputs.EC2_PUBLIC_IP }}
          ssh-keyscan -H $TARGET_IP >> /home/runner/.ssh/known_hosts

      # Inventory 파일 생성 (절대 경로 사용)
      - name: Create Ansible inventory file
        run: |
         cd ansible
         echo "[k3s_cluster]" > inventory.ini
         echo "${{ needs.terraform.outputs.EC2_PUBLIC_IP }} ansible_user=ec2-user ansible_ssh_private_key_file=/home/runner/.ssh/id_rsa" >> inventory.ini

      - name: Install Ansible collections
        run: |
          # Install collections directly into the ansible directory
          ansible-galaxy collection install community.kubernetes -p ./ansible/collections

      # Deployment YAML에 RDS endpoint 치환
      - name: Replace RDS endpoint in Deployment YAML
        run: |
          sed -i "s|__RDS_ENDPOINT__|${{ needs.terraform.outputs.RDS_ENDPOINT }}|g" ansible/roles/k3s/infra.yml

      # GitHub Secret(DB_PASSWORD)을 K3s Secret으로 생성
      - name: Create Kubernetes DB Secret
        run: |
          TARGET_IP=${{ needs.terraform.outputs.EC2_PUBLIC_IP }}
          DB_PASS=${{ secrets.DB_PASSWORD }}

          ssh -i /home/runner/.ssh/id_rsa ec2-user@$TARGET_IP << EOF
            kubectl create secret generic db-secret \
              --from-literal=DB_PASSWORD="$DB_PASS" \
              --dry-run=client -o yaml | sudo k3s kubectl apply -f -
          EOF

      # EC2에서 RDS에 접속해서 init.sql 실행
      - name: Upload init.sql and initialize RDS
        run: |
          TARGET_IP=${{ needs.terraform.outputs.EC2_PUBLIC_IP }}
          RDS_ENDPOINT=${{ needs.terraform.outputs.RDS_ENDPOINT }}
          DB_USER=admin
          DB_PASS=${{ secrets.DB_PASSWORD }}

          # init.sql을 EC2에 올리기
          scp -i /home/runner/.ssh/id_rsa ./init.sql ec2-user@$TARGET_IP:/home/ec2-user/init.sql

          # SSH로 접속해서 MySQL 실행 (변수를 인라인으로 전달)
          ssh -i /home/runner/.ssh/id_rsa ec2-user@$TARGET_IP \
            "mysql -h $RDS_ENDPOINT -u $DB_USER -p'$DB_PASS' < /home/ec2-user/init.sql"
          
      # 앤서블 실행
      - name: Ansible Running Start
        run: |
          cd ansible
          ansible-playbook -i inventory.ini site.yml
